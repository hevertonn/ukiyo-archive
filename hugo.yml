baseURL: "https://ukiyoarchive.com/"
title: "Ukiyo Archive"
copyright: "© 2026 Heverton Borges"
theme: PaperMod

params:
  defaultTheme: auto
  ShowShareButtons: true
  ShowReadingTime: true
  ShowToc: true
  TocOpen: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true

  homeInfoParams:
    Title: "Hi there, I'm Heverton."

  socialIcons:
    - name: "github"
      url: "https://github.com/hevertonn"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/hevertonn/"

menu:
  main:
  - name: Archive
    url: archives/
    weight: 5
  - name: Search
    url: search/
    weight: 10
  - name: Tags
    url: tags/
    weight: 15

outputs:
  home:
    - HTML
    - RSS
    - JSON
